<!doctype html>

<html lang="en" class="dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Login | VeriNews AI</title>

        <script src="https://cdn.tailwindcss.com"></script>

        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
            rel="stylesheet"
        />

        <style>
            body {
                font-family: "Inter", sans-serif;
                background: linear-gradient(135deg, #0f172a, #020617);
            }
            .card {
                background: rgba(255, 255, 255, 0.05);
                backdrop-filter: blur(10px);
                border: 1px solid rgba(255, 255, 255, 0.1);
            }
        </style>
    </head>

    <body class="flex items-center justify-center min-h-screen">
        <div
            class="grid md:grid-cols-2 max-w-5xl w-full rounded-xl overflow-hidden shadow-2xl"
        >
            <!-- LEFT SIDE -->

            <div
                class="hidden md:flex flex-col justify-center p-10 bg-gradient-to-br from-green-500/20 to-transparent"
            >
                <h1 class="text-4xl font-bold mb-4 text-white">
                    Welcome Back 👋
                    <br />
                    <span
                        class="bg-gradient-to-r from-green-400 to-emerald-300 bg-clip-text text-transparent"
                    >
                    </span>
                </h1>
                <p class="text-gray-400">
                    Login to continue analyzing news with AI-powered detection.
                </p>
            </div>

            <!-- RIGHT SIDE -->

            <div class="card p-10">
                <h2 class="text-2xl font-bold mb-6 text-center text-white">
                    Sign In
                </h2>

                {% if error %}

                <p class="text-red-400 text-sm mb-4 text-center">{{ error }}</p>
                {% endif %}

                <form method="POST" class="space-y-5">
                    <input
                        type="text"
                        name="username"
                        placeholder="Username"
                    <input type="text" name="username" placeholder="Username"
                    class="w-full p-3 rounded bg-gray-900 border border-gray-600 text-white placeholder-gray-400 focus:ring-2 focus:ring-green-500 outline-none">

                    <input
                        type="password"
                        name="password"
                        placeholder="Password"
                    <input type="password" name="password" placeholder="Password"
                    class="w-full p-3 rounded bg-gray-900 border border-gray-600 text-white placeholder-gray-400 focus:ring-2 focus:ring-green-500 outline-none">
                    />

                    <button
                        type="submit"
                        class="w-full bg-green-500 py-3 rounded font-bold text-black hover:scale-105 transition"
                    >
                        Login
                    </button>
                </form>

                <p class="text-center text-gray-400 mt-6">
                    Don’t have an account?
                    <a href="{{ url_for('register') }}" class="text-green-400"
                        >Register</a
                    >
                </p>
            </div>
        </div>
    </body>
</html>
