<!doctype html>
<html>
    <head>
        <title>Login</title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>

    <body
        class="bg-gradient-to-r from-blue-500 to-purple-600 h-screen flex items-center justify-center"
    >
        <div class="bg-white p-8 rounded-xl shadow-lg w-96">
            <h2 class="text-2xl font-bold text-center mb-6">🔐 Login</h2>

            <form method="POST">
                <input
                    name="username"
                    placeholder="Username"
                    class="w-full p-2 border rounded mb-4"
                />

                <input
                    type="password"
                    name="password"
                    placeholder="Password"
                    class="w-full p-2 border rounded mb-4"
                />

                <button class="w-full bg-blue-500 text-white py-2 rounded">
                    Login
                </button>
            </form>

            <p class="text-center mt-4">
                New user? <a href="/register" class="text-blue-500">Register</a>
            </p>
        </div>
    </body>
</html>
